<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analogy Generator</title>
  <style>
    :root {
      --bg: #f8f7f4;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-light: #999;
      --border: #e5e2dc;
      --border-light: #f0ede8;
      --accent: #3b5bdb;
      --accent-hover: #2b4bc8;
      --accent-light: #edf2ff;
      --accent-subtle: #dbe4ff;
      --tag-bg: #f3f1ed;
      --success: #2b8a3e;
      --success-bg: #ebfbee;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 14px;
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    /* Daily analogy */
    .daily-section {
      margin-bottom: 2rem;
    }

    .daily-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .daily-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent), #748ffc);
      border-radius: 4px 0 0 4px;
    }

    .daily-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: var(--accent-light);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
    }

    .daily-label::before {
      content: '\2728';
      font-size: 0.75rem;
    }

    .daily-card .card-concept {
      font-size: 1.05rem;
      margin-bottom: 0.6rem;
    }

    .daily-card .card-analogy {
      color: var(--text-muted);
    }

    /* Category pills */
    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.75rem;
      justify-content: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.75rem;
      background: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(59, 91, 219, 0.25);
    }

    .pill .pill-count {
      font-size: 0.68rem;
      opacity: 0.6;
      font-weight: 400;
    }

    .pill.active .pill-count {
      opacity: 0.8;
    }

    /* Search form */
    .search-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      align-items: stretch;
    }

    .autocomplete-wrap {
      position: relative;
      flex: 1;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      outline: none;
      transition: all 0.2s;
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      color: var(--text);
    }

    input[type="text"]::placeholder {
      color: var(--text-light);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.1), var(--shadow-sm);
    }

    .search-btn {
      padding: 0.7rem 1.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(59, 91, 219, 0.2);
    }

    .search-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(59, 91, 219, 0.3); }
    .search-btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    /* Results */
    .results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .card-concept {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .card-category {
      display: inline-block;
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .card-analogy {
      font-size: 0.92rem;
      line-height: 1.7;
      color: #444;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-light);
    }

    .btn-action {
      padding: 0.4rem 0.85rem;
      background: var(--tag-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-action:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-action.btn-another {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent-subtle);
    }

    .btn-action.btn-another:hover {
      background: var(--accent-subtle);
      color: var(--accent-hover);
    }

    .btn-action.copied {
      background: var(--success-bg);
      color: var(--success);
      border-color: #c3fae8;
    }


    /* Empty & error states */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 2.5rem 1rem;
      font-size: 0.92rem;
    }

    .card.weak {
      opacity: 0.55;
      border-style: dashed;
    }

    .weak-heading {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 0.5rem 0;
    }

    .error {
      color: #e03131;
      font-size: 0.88rem;
      padding: 0.75rem 1rem;
      background: #fff5f5;
      border: 1px solid #ffc9c9;
      border-radius: var(--radius-sm);
    }

    /* Autocomplete */
    .ac-list {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-height: 260px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: var(--shadow-lg);
    }

    .ac-list.open { display: block; }

    .ac-item {
      padding: 0.6rem 1rem;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.1s;
    }

    .ac-item:first-child { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
    .ac-item:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }

    .ac-item:hover,
    .ac-item.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .ac-item mark {
      background: none;
      color: var(--accent);
      font-weight: 700;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-light);
      color: var(--text-light);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h1>Analogy Generator</h1>
      <p class="subtitle">Enter a concept and find an analogy that makes it click.</p>
    </div>

    <div class="daily-section" id="dailySection"></div>

    <div class="category-bar" id="categoryBar"></div>

    <form class="search-form" id="searchForm">
      <div class="autocomplete-wrap">
        <input type="text" id="conceptInput" placeholder="Search for a concept..." autofocus autocomplete="off">
        <div class="ac-list" id="acList"></div>
      </div>
      <button type="submit" id="searchBtn" class="search-btn">Search</button>
    </form>

    <div id="results" class="results"></div>

    <div class="site-footer">
      <span>295 analogies across 138 concepts</span>
    </div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('conceptInput');
    const btn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('results');
    const acList = document.getElementById('acList');

    let allConcepts = [];
    let acIndex = -1;
    let currentConcept = '';
    let seenIds = [];

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Fetch concept list on load
    fetch('/concepts').then(r => r.json()).then(data => { allConcepts = data; });

    function highlightMatch(text, query) {
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return esc(text);
      return esc(text.slice(0, idx)) + '<mark>' + esc(text.slice(idx, idx + query.length)) + '</mark>' + esc(text.slice(idx + query.length));
    }

    function showSuggestions(query) {
      acIndex = -1;
      if (!query || query.length < 1) { acList.classList.remove('open'); return; }
      const q = query.toLowerCase();
      const matches = allConcepts.filter(c => c.toLowerCase().includes(q)).slice(0, 7);
      if (matches.length === 0) { acList.classList.remove('open'); return; }
      acList.innerHTML = matches.map((m, i) =>
        `<div class="ac-item" data-index="${i}">${highlightMatch(m, query)}</div>`
      ).join('');
      acList.classList.add('open');
    }

    function selectSuggestion(text) {
      input.value = text.replace(/<\/?mark>/g, '');
      acList.classList.remove('open');
      seenIds = [];
      form.requestSubmit();
    }

    input.addEventListener('input', () => showSuggestions(input.value.trim()));

    input.addEventListener('keydown', (e) => {
      const items = acList.querySelectorAll('.ac-item');
      if (!acList.classList.contains('open') || items.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acIndex = Math.min(acIndex + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acIndex = Math.max(acIndex - 1, 0);
        items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
      } else if (e.key === 'Enter' && acIndex >= 0) {
        e.preventDefault();
        selectSuggestion(items[acIndex].textContent);
      } else if (e.key === 'Escape') {
        acList.classList.remove('open');
      }
    });

    acList.addEventListener('click', (e) => {
      const item = e.target.closest('.ac-item');
      if (item) selectSuggestion(item.textContent);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.autocomplete-wrap')) acList.classList.remove('open');
    });

    async function doSearch(concept, excludeIds) {
      const body = { concept, n_results: 5, exclude_ids: excludeIds };
      const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return res.json();
    }

    function renderResult(r, hasMore) {
      const categoryTag = r.category ? `<div class="card-category">${esc(r.category)}</div>` : '';
      const copyBtn = `<button class="btn-action" onclick="copyAnalogy(this, '${esc(r.concept).replace(/'/g, "\\'")}', '${esc(r.analogy).replace(/'/g, "\\'")}')">Copy</button>`;
      const anotherBtn = hasMore
        ? `<button class="btn-action btn-another" onclick="explainAnotherWay()">Explain another way</button>`
        : '';
      return `
        <div class="card">
          ${categoryTag}
          <div class="card-concept">${esc(r.concept)}</div>
          <div class="card-analogy">${esc(r.analogy)}</div>
          <div class="card-footer">${copyBtn}${anotherBtn}</div>
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      acList.classList.remove('open');
      e.preventDefault();
      const concept = input.value.trim();
      if (!concept) return;

      if (concept !== currentConcept) {
        seenIds = [];
        currentConcept = concept;
      }

      document.getElementById('dailySection').style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Searching...';
      resultsDiv.innerHTML = '';

      try {
        const data = await doSearch(concept, seenIds);

        if (data.error) {
          resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
          return;
        }

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = '<p class="empty-state">No matching analogies found. Try a different concept.</p>';
          return;
        }

        const DISTANCE_THRESHOLD = 0.6;
        const strong = data.results.filter(r => r.distance <= DISTANCE_THRESHOLD);
        const weak = data.results.filter(r => r.distance > DISTANCE_THRESHOLD);

        if (strong.length === 0) {
          let html = '<p class="empty-state">No strong matches found for this concept.</p>';
          if (weak.length > 0) {
            html += '<p class="weak-heading">Closest (weak) match:</p>';
            html += renderResult(weak[0], false);
          }
          resultsDiv.innerHTML = html;
          return;
        }

        const best = strong[0];
        seenIds.push(best.id);
        const moreAvailable = strong.length > 1 || weak.length > 0;
        resultsDiv.innerHTML = renderResult(best, moreAvailable);
      } catch (err) {
        resultsDiv.innerHTML = `<p class="error">Something went wrong. Is the server running?</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search';
      }
    });

    async function explainAnotherWay() {
      resultsDiv.innerHTML = '<p class="empty-state">Finding another way...</p>';

      try {
        const data = await doSearch(currentConcept, seenIds);

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = '<p class="empty-state">No more analogies for this concept.</p>';
          return;
        }

        const DISTANCE_THRESHOLD = 0.6;
        const strong = data.results.filter(r => r.distance <= DISTANCE_THRESHOLD);

        if (strong.length === 0) {
          resultsDiv.innerHTML = '<p class="empty-state">No more analogies for this concept.</p>';
          return;
        }

        const best = strong[0];
        seenIds.push(best.id);
        const moreAvailable = strong.length > 1;
        resultsDiv.innerHTML = renderResult(best, moreAvailable);
      } catch (err) {
        resultsDiv.innerHTML = `<p class="error">Something went wrong.</p>`;
      }
    }

    // Copy analogy to clipboard
    function copyAnalogy(btn, concept, analogy) {
      const text = concept + '\n\n' + analogy;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    // Daily analogy
    fetch('/daily').then(r => r.ok ? r.json() : null).then(data => {
      if (!data || data.error) return;
      document.getElementById('dailySection').innerHTML = `
        <div class="daily-card">
          <div class="daily-label">Analogy of the Day</div>
          <div class="card-concept">${esc(data.concept)}</div>
          <div class="card-analogy">${esc(data.analogy)}</div>
        </div>
      `;
    });

    // Category pills
    let activeCategory = null;

    fetch('/categories').then(r => r.json()).then(cats => {
      if (!cats || cats.length === 0) return;
      const bar = document.getElementById('categoryBar');
      bar.innerHTML = cats.map(c =>
        `<span class="pill" data-category="${esc(c.name)}">${esc(c.name)}<span class="pill-count">${c.count}</span></span>`
      ).join('');

      bar.addEventListener('click', (e) => {
        const pill = e.target.closest('.pill');
        if (!pill) return;
        const cat = pill.dataset.category;
        if (activeCategory === cat) {
          activeCategory = null;
          pill.classList.remove('active');
          fetch('/concepts').then(r => r.json()).then(data => { allConcepts = data; });
          input.placeholder = 'Search for a concept...';
        } else {
          activeCategory = cat;
          bar.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          fetch('/concepts?category=' + encodeURIComponent(cat)).then(r => r.json()).then(data => {
            allConcepts = data;
          });
          input.placeholder = 'Search in ' + cat + '...';
        }
        input.focus();
      });
    });
  </script>
</body>
</html>
