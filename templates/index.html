<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analogy Generator</title>
  <style>
    :root {
      --bg: #fafaf9;
      --card-bg: #fff;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: #e7e5e4;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --tag-bg: #f5f5f4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .search-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    select {
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: var(--card-bg);
      outline: none;
      cursor: pointer;
    }

    button {
      padding: 0.6rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .card-concept {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .card-analogy {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .card-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      background: var(--tag-bg);
      border-radius: 100px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
      font-size: 0.95rem;
    }

    .card.weak {
      opacity: 0.6;
      border-style: dashed;
    }

    .weak-heading {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0.5rem 0;
    }

    .error {
      color: #dc2626;
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Analogy Generator</h1>
    <p class="subtitle">Enter a concept and find an analogy that makes it click.</p>

    <form class="search-form" id="searchForm">
      <div class="input-row">
        <input type="text" id="conceptInput" placeholder="e.g. recursion, caching, load balancing..." autofocus>
        <select id="domainSelect">
          <option value="">Any domain</option>
          <option value="everyday life">Everyday life</option>
          <option value="cooking">Cooking</option>
          <option value="sports">Sports</option>
          <option value="music">Music</option>
          <option value="construction">Construction</option>
          <option value="nature">Nature</option>
        </select>
      </div>
      <button type="submit" id="searchBtn">Search</button>
    </form>

    <div id="results" class="results"></div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('conceptInput');
    const domainSelect = document.getElementById('domainSelect');
    const btn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const concept = input.value.trim();
      if (!concept) return;

      btn.disabled = true;
      btn.textContent = 'Searching...';
      resultsDiv.innerHTML = '';

      try {
        const body = { concept };
        const domain = domainSelect.value;
        if (domain) body.domain = domain;

        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (data.error) {
          resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
          return;
        }

        if (!data.results || data.results.length === 0) {
          resultsDiv.innerHTML = '<p class="empty-state">No matching analogies found. Try a different concept or remove the domain filter.</p>';
          return;
        }

        const DISTANCE_THRESHOLD = 0.6;
        const strong = data.results.filter(r => r.distance <= DISTANCE_THRESHOLD);
        const weak = data.results.filter(r => r.distance > DISTANCE_THRESHOLD);

        if (strong.length === 0) {
          let html = '<p class="empty-state">No strong matches found for this concept';
          if (domain) html += ' in the "' + domain + '" domain. Try "Any domain"';
          html += '.</p>';
          if (weak.length > 0) {
            html += '<p class="weak-heading">Closest (weak) matches:</p>';
            html += weak.slice(0, 3).map(r => `
              <div class="card weak">
                <div class="card-concept">${r.concept}</div>
                <div class="card-analogy">${r.analogy}</div>
                <div class="card-tags">
                  <span class="tag">${r.domain}</span>
                  <span class="tag">${r.audience}</span>
                </div>
              </div>
            `).join('');
          }
          resultsDiv.innerHTML = html;
          return;
        }

        resultsDiv.innerHTML = strong.map(r => `
          <div class="card">
            <div class="card-concept">${r.concept}</div>
            <div class="card-analogy">${r.analogy}</div>
            <div class="card-tags">
              <span class="tag">${r.domain}</span>
              <span class="tag">${r.audience}</span>
            </div>
          </div>
        `).join('');
      } catch (err) {
        resultsDiv.innerHTML = `<p class="error">Something went wrong. Is the server running?</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search';
      }
    });
  </script>
</body>
</html>
